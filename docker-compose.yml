version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: hms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - hms_db_data:/data/db
    networks:
      - hms-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/hms_db
      - ACCESS_TOKEN_SECRET=prod_access_secret_key_change_me_9988
      - REFRESH_TOKEN_SECRET=prod_refresh_secret_key_change_me_1122
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      - ALLOWED_CLIENT_ORIGIN=http://localhost
    volumes:
      - hms_uploads:/usr/src/app/uploads
    networks:
      - hms-network
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    ports:
      - "80:80"
    networks:
      - hms-network
    depends_on:
      - backend
    restart: always

volumes:
  hms_db_data:
  hms_uploads:

networks:
  hms-network:
    driver: bridge
